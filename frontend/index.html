<!DOCTYPE html>
<html>

<head>
    <title>Support Ticket System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Support Ticket System</h1>

<div class="container">

<!-- Ticket Form -->

<div class="card">

<h2>Create Ticket</h2>

<input id="title" placeholder="Ticket Title">

<textarea id="description" placeholder="Describe your issue" onblur="classifyTicket()"></textarea>

<label>Category</label>
<select id="category">
<option value="billing">Billing</option>
<option value="technical">Technical</option>
<option value="account">Account</option>
<option value="general">General</option>
</select>

<label>Priority</label>
<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
<option value="critical">Critical</option>
</select>

<button onclick="submitTicket()">Submit Ticket</button>

</div>


<!-- Filters -->

<div class="card">

<h2>Filters</h2>

<select id="filterCategory" onchange="loadTickets()">
<option value="">All Categories</option>
<option value="billing">Billing</option>
<option value="technical">Technical</option>
<option value="account">Account</option>
<option value="general">General</option>
</select>

<select id="filterPriority" onchange="loadTickets()">
<option value="">All Priority</option>
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
<option value="critical">Critical</option>
</select>

<select id="filterStatus" onchange="loadTickets()">
<option value="">All Status</option>
<option value="open">Open</option>
<option value="in_progress">In Progress</option>
<option value="resolved">Resolved</option>
<option value="closed">Closed</option>
</select>

</div>


<!-- Stats -->

<div class="card">

<h2>Stats Dashboard</h2>

<div id="stats"></div>

</div>


<!-- Ticket List -->

<div class="card">

<h2>Tickets</h2>

<div id="tickets"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
